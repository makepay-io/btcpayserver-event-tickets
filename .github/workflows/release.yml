name: Release plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Test
        run: dotnet test tests/BTCPayServer.Plugins.MakePay.EventTickets.Tests/BTCPayServer.Plugins.MakePay.EventTickets.Tests.csproj --configuration Release -p:RazorCompileOnBuild=true --verbosity normal -m:1
      - name: Publish
        run: |
          dotnet publish src/BTCPayServer.Plugins.MakePay.EventTickets/BTCPayServer.Plugins.MakePay.EventTickets.csproj --configuration Release -p:RazorCompileOnBuild=true --no-restore --output artifacts/plugin -m:1
          cp packaging/BTCPayServer.Plugins.MakePay.EventTickets.json artifacts/plugin/
          cd artifacts/plugin
          zip -9 ../BTCPayServer.Plugins.MakePay.EventTickets.btcpay *
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/BTCPayServer.Plugins.MakePay.EventTickets.btcpay
